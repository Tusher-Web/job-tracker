<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-base-200">

<div class="max-w-5xl mx-auto p-4">
    <h1 class="text-3xl font-bold"> Job Application Tracker </h1>

    <!-- Dashboard Section -->
    <div class="grid md:grid-cols-3 gap-4 my-6">
        <div class="card bg-base-100">
            <div class="card-body">
                <p>Total</p>
                <h2 id="totalCount">0</h2>
            </div>
        </div>
        <div class="card bg-base-100">
            <div class="card-body">
                <p>Interview</p>
                <h2 id="interviewCount">0</h2>
            </div>
        </div>
        <div class="card bg-base-100">
            <div class="card-body">
                <p>Rejected</p>
                <h2 id="rejectedCount">0</h2>
            </div>
        </div>
    </div>

    <!-- Tabs Section -->
    <div class="tabs tabs-boxed">
        <button id="allTab" class="tab tab-active"> All </button>
        <button id="interviewTab" class="tab"> Interview </button>
        <button id="rejectedTab" class="tab"> Rejected </button>
    </div>

    <!-- All Applied Jobs -->
    <div id="jobContainer"></div>
</div>
    

    <!-- Job Data JS File -->
     <script src="/js/data.js"></script>
</body>
</html>
